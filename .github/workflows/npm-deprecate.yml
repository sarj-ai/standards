name: npm-deprecate (one-off)

on:
  workflow_dispatch:

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Deprecate @sarj/lint-configs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm deprecate "@sarj/lint-configs" "Removed in favor of sarj-lint-configs on PyPI (https://pypi.org/project/sarj-lint-configs/)."
