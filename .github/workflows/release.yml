name: release

on:
  push:
    tags:
      - 'typescript-v*'
      - 'python-v*'
      - 'sql-v*'
      - 'lint-configs-v*'
      - 'tsconfig-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which package to publish'
        required: true
        type: choice
        options:
          - typescript
          - python
          - sql
          - lint-configs
          - tsconfig
          - all
  # Called by auto-release.yml on merge to main so the publish runs in THIS
  # workflow's context (keeps PyPI trusted-publisher / npm provenance bound to
  # release.yml). `target` selects the single package whose version changed.
  workflow_call:
    inputs:
      target:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-typescript:
    if: startsWith(github.ref, 'refs/tags/typescript-v') || inputs.target == 'typescript' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test
      # No --provenance: npm provenance requires a PUBLIC source repo, but this
      # repo is internal. Publishes via NODE_AUTH_TOKEN instead.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    if: startsWith(github.ref, 'refs/tags/python-v') || inputs.target == 'python' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: 'packages/**/uv.lock'
      - run: uv python install 3.14
      - run: uv sync --dev
      - run: uv run pytest -q
      - run: uv build --wheel --sdist
      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: packages/python/dist

  publish-sql:
    if: startsWith(github.ref, 'refs/tags/sql-v') || inputs.target == 'sql' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/sql
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: 'packages/**/uv.lock'
      - run: uv python install 3.14
      - run: uv sync --dev
      - run: uv run pytest -q
      - run: uv build --wheel --sdist
      - run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN_SQL_LINT }}

  publish-lint-configs:
    if: startsWith(github.ref, 'refs/tags/lint-configs-v') || inputs.target == 'lint-configs' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/lint-configs
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: 'packages/**/uv.lock'
      - run: uv python install 3.14
      - run: uv build --wheel
      - name: Test against the built wheel
        run: |
          uv venv --python 3.14 --seed
          uv pip install ./dist/*.whl pytest ruff
          uv run --no-project pytest -q tests/
      - run: uv build --sdist
      - run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN_LINT_CONFIGS }}

  publish-tsconfig:
    if: startsWith(github.ref, 'refs/tags/tsconfig-v') || inputs.target == 'tsconfig' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/tsconfig
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('base.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('strict.json','utf8'))"
      # No --provenance: npm provenance requires a PUBLIC source repo, but this
      # repo is internal. Publishes via NODE_AUTH_TOKEN instead.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

