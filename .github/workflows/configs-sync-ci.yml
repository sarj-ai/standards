name: configs sync

# The root .ruff-strict.toml / .pyright-strict.json are the synced consumer artifacts
# that every package extends to dogfood the standard. They must stay byte-identical to
# the published source of truth in packages/lint-configs. This guards against editing
# one without the other (which would silently lint the repo with a stale config).

on:
  push:
    branches: [main]
    paths:
      - 'packages/lint-configs/src/sarj_lint_configs/configs/**'
      - '.ruff-strict.toml'
      - '.pyright-strict.json'
      - 'Makefile'
      - '.github/workflows/configs-sync-ci.yml'
  pull_request:
    paths:
      - 'packages/lint-configs/src/sarj_lint_configs/configs/**'
      - '.ruff-strict.toml'
      - '.pyright-strict.json'
      - 'Makefile'
      - '.github/workflows/configs-sync-ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: make check-configs-synced
