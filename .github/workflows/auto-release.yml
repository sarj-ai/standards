name: auto-release

# Publishes automatically on merge to main — no manual tag/deploy needed.
# On each push to main, detect which package's version was bumped (vs the
# previous main commit) and publish only that package by calling release.yml.
# A package publishes iff its manifest `version` line changed, so a re-merge
# without a version bump is a no-op (and never hits a duplicate-version error).

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.changes.outputs.typescript }}
      python: ${{ steps.changes.outputs.python }}
      sql: ${{ steps.changes.outputs.sql }}
      lint-configs: ${{ steps.changes.outputs.lint-configs }}
      tsconfig: ${{ steps.changes.outputs.tsconfig }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: changes
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          # True iff the manifest's own `version` line changed between BEFORE..AFTER.
          ver_changed () {
            local file="$1" pattern="$2"
            if git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
              git diff --no-color "$BEFORE" "$AFTER" -- "$file" | grep -qE "$pattern"
            else
              return 1  # no usable base (first push) -> don't publish
            fi
          }
          emit () { echo "$1=$( { ver_changed "$2" "$3"; } && echo true || echo false )" >> "$GITHUB_OUTPUT"; }
          emit typescript    packages/typescript/package.json   '^\+[[:space:]]*"version":'
          emit tsconfig      packages/tsconfig/package.json     '^\+[[:space:]]*"version":'
          emit python        packages/python/pyproject.toml     '^\+version = '
          emit sql           packages/sql/pyproject.toml        '^\+version = '
          emit lint-configs  packages/lint-configs/pyproject.toml '^\+version = '
          cat "$GITHUB_OUTPUT"

  publish-typescript:
    needs: detect
    if: needs.detect.outputs.typescript == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      target: typescript
    secrets: inherit

  # NOTE: sarj-python-lint is intentionally NOT auto-published here. It uses PyPI
  # Trusted Publishing (OIDC), which PyPI does not support via reusable workflows
  # (workflow_call) — only via a directly-triggered workflow. So publish it by
  # pushing a tag, which runs release.yml non-reusably:
  #     git tag -a python-v<X.Y.Z> -m "release" && git push origin python-v<X.Y.Z>
  # (To fully automate it too, add a RELEASE_PAT secret and switch this workflow
  # to push tags via that PAT — see the PR description.)

  publish-sql:
    needs: detect
    if: needs.detect.outputs.sql == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      target: sql
    secrets: inherit

  publish-lint-configs:
    needs: detect
    if: needs.detect.outputs.lint-configs == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      target: lint-configs
    secrets: inherit

  publish-tsconfig:
    needs: detect
    if: needs.detect.outputs.tsconfig == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      target: tsconfig
    secrets: inherit
