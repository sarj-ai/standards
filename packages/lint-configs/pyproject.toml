[project]
name = "sarj-lint-configs"
version = "0.1.0"
description = "Maximally-strict ruff + pyright + ESLint configs for sarj-ai Python/TypeScript projects."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "sarj-ai" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = []

[project.scripts]
sarj-lint-configs = "sarj_lint_configs.__main__:main"

[project.urls]
Homepage = "https://github.com/sarj-ai/linting"
Repository = "https://github.com/sarj-ai/linting"
Issues = "https://github.com/sarj-ai/linting/issues"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sarj_lint_configs"]

[tool.hatch.build.targets.sdist]
include = [
  "src/sarj_lint_configs/**",
  "README.md",
  "pyproject.toml",
]

