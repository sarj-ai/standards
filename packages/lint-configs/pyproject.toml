[project]
name = "sarj-lint-configs"
version = "0.2.0"
description = "Maximally-strict ruff + pyright + ESLint configs for sarj-ai Python/TypeScript projects."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "MIT" }
authors = [{ name = "sarj-ai" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = []

[project.scripts]
sarj-lint-configs = "sarj_lint_configs.__main__:main"

[project.urls]
Homepage = "https://github.com/sarj-ai/standards"
Repository = "https://github.com/sarj-ai/standards"
Issues = "https://github.com/sarj-ai/standards/issues"

[build-system]
requires = ["hatchling>=1.30"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sarj_lint_configs"]

[tool.hatch.build.targets.sdist]
include = [
  "src/sarj_lint_configs/**",
  "README.md",
  "pyproject.toml",
]

[dependency-groups]
dev = [
  "pytest>=9.0",
  "ruff>=0.15",
  "basedpyright>=1.39",
]

# Dogfooding: linted/formatted by this repo's own published config (root-synced).
[tool.ruff]
extend = "../../.ruff-strict.toml"

