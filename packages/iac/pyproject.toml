[project]
name = "sarj-iac-lint"
version = "0.2.0"
description = "Custom Terraform / IaC lint rules — stdlib, pre-commit-friendly."
readme = "README.md"
authors = [{ name = "sarj-ai" }]
license = { text = "MIT" }
requires-python = ">=3.14"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = []

[project.scripts]
sarj-iac-lint = "sarj_iac_lint.__main__:main"

[project.urls]
Homepage = "https://github.com/sarj-ai/standards/tree/main/packages/iac"
Repository = "https://github.com/sarj-ai/standards"
Issues = "https://github.com/sarj-ai/standards/issues"

[dependency-groups]
dev = [
  "pytest>=9.0",
  "ruff>=0.15",
  "basedpyright>=1.39",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sarj_iac_lint"]

[tool.hatch.build.targets.sdist]
include = [
  "src",
  "README.md",
  "pyproject.toml",
]
exclude = [
  "tests/",
  "**/__pycache__/",
  "**/*.pyc",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

# Dogfooding: linted/formatted by this repo's own published config (root-synced).
[tool.ruff]
extend = "../../.ruff-strict.toml"
