[project]
name = "sarj-python-lint"
version = "0.1.1"
description = "Custom Python + SQL lint rules — AST-based, pre-commit-friendly, hypermodern defaults"
readme = "README.md"
authors = [{ name = "sarj-ai" }]
license = { text = "MIT" }
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
  "sqlfluff>=3.0",
]

[project.scripts]
sarj-python-lint = "sarj_python_lint.__main__:main"

[project.urls]
Homepage = "https://github.com/sarj-ai/linting/tree/main/packages/python-lint"
Repository = "https://github.com/sarj-ai/linting"
Issues = "https://github.com/sarj-ai/linting/issues"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sarj_python_lint"]

[tool.hatch.build.targets.sdist]
include = [
  "src",
  "README.md",
  "pyproject.toml",
  ".pre-commit-hooks.yaml",
]
exclude = [
  "tests/",
  "**/__pycache__/",
  "**/*.pyc",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
