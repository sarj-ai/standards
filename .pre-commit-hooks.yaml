- id: sarj-no-sequential-await
  name: 'sarj-lint: no sequential `await` in for-loop'
  entry: sarj-python-lint check --rule no-sequential-await
  language: python
  types: [python]

- id: sarj-inefficient-string-concat-in-loop
  name: 'sarj-lint: inefficient string concat in loop'
  entry: sarj-python-lint check --rule inefficient-string-concat-in-loop
  language: python
  types: [python]

- id: sarj-prefer-str-enum
  name: 'sarj-lint: prefer StrEnum for choice-shaped str fields'
  entry: sarj-python-lint check --rule prefer-str-enum
  language: python
  types: [python]

- id: sarj-no-fat-try-blocks
  name: 'sarj-lint: try block body exceeds 3 statements'
  entry: sarj-python-lint check --rule no-fat-try-blocks
  language: python
  types: [python]

- id: sarj-pydantic-at-boundaries
  name: 'sarj-lint: pydantic models (not raw dicts/tuples) at function boundaries'
  entry: sarj-python-lint check --rule pydantic-at-boundaries
  language: python
  types: [python]

- id: sarj-no-isinstance-union-chain
  name: 'sarj-lint: if/elif isinstance chain — prefer match/case with assert_never'
  entry: sarj-python-lint check --rule no-isinstance-union-chain
  language: python
  types: [python]

- id: sarj-prefer-class-row
  name: 'sarj-lint: psycopg row_factory=dict_row — prefer class_row(Model)'
  entry: sarj-python-lint check --rule prefer-class-row
  language: python
  types: [python]

- id: sarj-prefer-timedelta-for-durations
  name: 'sarj-lint: duration named in time units typed as raw int/float — use timedelta'
  entry: sarj-python-lint check --rule prefer-timedelta-for-durations
  language: python
  types: [python]

- id: sarj-prefer-struct-over-namedtuple
  name: 'sarj-lint: collections.namedtuple — prefer typing.NamedTuple / frozen model'
  entry: sarj-python-lint check --rule prefer-struct-over-namedtuple
  language: python
  types: [python]

- id: sarj-no-comment-cruft
  name: 'sarj-lint: commented-out code / section banners / file-header preamble'
  entry: sarj-python-lint check --rule no-comment-cruft
  language: python
  types: [python]

- id: sarj-no-fstring-in-log
  name: 'sarj-lint: f-string logging message — use structured keyword arguments'
  entry: sarj-python-lint check --rule no-fstring-in-log
  language: python
  types: [python]

- id: sarj-enforce-timestamptz
  name: 'sarj-lint(sql): TIMESTAMP must use WITH TIME ZONE (TIMESTAMPTZ)'
  entry: sarj-sql-lint check --rule enforce-timestamptz
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-ban-postgres-enums
  name: 'sarj-lint(sql): ban native postgres ENUM types (prefer TEXT with CHECK)'
  entry: sarj-sql-lint check --rule no-pg-enum
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-ban-create-trigger
  name: 'sarj-lint(sql): ban database triggers (prefer application-level logic)'
  entry: '(?i)CREATE TRIGGER'
  language: pygrep
  types: [sql]

- id: sarj-prefer-text-over-varchar
  name: 'sarj-lint(sql): ban VARCHAR(n) in postgres migrations (use TEXT)'
  entry: sarj-sql-lint check --rule prefer-text-over-varchar
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-idempotent-ddl
  name: 'sarj-lint(sql): DDL must be re-runnable (IF [NOT] EXISTS)'
  entry: sarj-sql-lint check --rule idempotent-ddl
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-insert-requires-on-conflict
  name: 'sarj-lint(sql): INSERT in migrations must be an idempotent upsert (ON CONFLICT)'
  entry: sarj-sql-lint check --rule insert-requires-on-conflict
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-prefer-jsonb
  name: 'sarj-lint(sql): use JSONB, not JSON'
  entry: sarj-sql-lint check --rule prefer-jsonb
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-no-limit-offset
  name: 'sarj-lint(sql): no OFFSET pagination (use cursor pagination)'
  entry: sarj-sql-lint check --rule no-limit-offset
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-index-concurrently
  name: 'sarj-lint(sql): CREATE INDEX must use CONCURRENTLY'
  entry: sarj-sql-lint check --rule index-concurrently
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-require-deletion-protection
  name: 'sarj-lint(iac): stateful resource must keep deletion_protection = true'
  entry: sarj-iac-lint check --rule require-deletion-protection
  language: python
  files: '\.(tf|hcl)$'
  additional_dependencies: ['sarj-iac-lint']

- id: sarj-no-comment-cruft-iac
  name: 'sarj-lint(iac): commented-out Terraform / section-banner comments'
  entry: sarj-iac-lint check --rule no-comment-cruft
  language: python
  files: '\.(tf|hcl|tfvars)$'
  additional_dependencies: ['sarj-iac-lint']

# New in standards 0.9.0 — Python security
- id: sarj-no-disabled-tls-verify
  name: 'sarj-lint: verify=False on httpx/requests defeats TLS — fix or sarj-noqa SARJ022'
  entry: sarj-python-lint check --rule no-disabled-tls-verify
  language: python
  types: [python]

- id: sarj-httpx-timeout-required
  name: 'sarj-lint: httpx call without explicit timeout= — the 5s default is a policy decision'
  entry: sarj-python-lint check --rule httpx-timeout-required
  language: python
  types: [python]

- id: sarj-no-credentialed-wildcard-cors
  name: 'sarj-lint: wildcard CORS with credentials (or wildcard fallback) — list explicit origins'
  entry: sarj-python-lint check --rule no-credentialed-wildcard-cors
  language: python
  types: [python]
