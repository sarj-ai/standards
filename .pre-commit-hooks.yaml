- id: sarj-no-sequential-await
  name: 'sarj-lint: no sequential `await` in for-loop'
  entry: sarj-python-lint check --rule no-sequential-await
  language: python
  types: [python]

- id: sarj-inefficient-string-concat-in-loop
  name: 'sarj-lint: inefficient string concat in loop'
  entry: sarj-python-lint check --rule inefficient-string-concat-in-loop
  language: python
  types: [python]

- id: sarj-prefer-discriminated-union
  name: 'sarj-lint: prefer discriminated union over BaseModel with success: bool'
  entry: sarj-python-lint check --rule prefer-discriminated-union
  language: python
  types: [python]

- id: sarj-prefer-str-enum
  name: 'sarj-lint: prefer StrEnum for choice-shaped str fields'
  entry: sarj-python-lint check --rule prefer-str-enum
  language: python
  types: [python]

- id: sarj-no-fat-try-blocks
  name: 'sarj-lint: try block body exceeds 3 statements'
  entry: sarj-python-lint check --rule no-fat-try-blocks
  language: python
  types: [python]

- id: sarj-enforce-timestamptz
  name: 'sarj-lint(sql): TIMESTAMP must use WITH TIME ZONE (TIMESTAMPTZ)'
  entry: sarj-sql-lint check --rule enforce-timestamptz
  language: python
  types: [sql]
  additional_dependencies: ['sarj-sql-lint']

- id: sarj-ban-postgres-enums
  name: 'sarj-lint(sql): ban native postgres ENUM types (prefer TEXT with CHECK)'
  entry: '(?i)CREATE TYPE.*AS ENUM'
  language: pygrep
  types: [sql]

- id: sarj-ban-create-trigger
  name: 'sarj-lint(sql): ban database triggers (prefer application-level logic)'
  entry: '(?i)CREATE TRIGGER'
  language: pygrep
  types: [sql]

- id: sarj-prefer-text-over-varchar
  name: 'sarj-lint(sql): ban VARCHAR(n) in postgres migrations (use TEXT)'
  entry: '(?i)VARCHAR\('
  language: pygrep
  types: [sql]
